[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
debug = false
debug-assertions = false
incremental = false
overflow-checks = false

[profile.dev]
opt-level = 0
debug = 2
debug-assertions = true
overflow-checks = true

[profile.dev.package."*"]
opt-level = 3
